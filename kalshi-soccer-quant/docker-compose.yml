version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kalshi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kalshi_dev}
      POSTGRES_DB: kalshi
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/setup_db.sql:/docker-entrypoint-initdb.d/01_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
  pg_data:
