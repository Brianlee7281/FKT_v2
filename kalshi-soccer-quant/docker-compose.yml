version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kalshi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kalshi_dev}
      POSTGRES_DB: kalshi
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/setup_db.sql:/docker-entrypoint-initdb.d/01_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi"]
      interval: 10s
      timeout: 3s
      retries: 3

  scheduler:
    build: .
    env_file: .env
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
    volumes:
      - ./config:/app/config:ro
      - ./config/kalshi_secret_key.pem:/app/kalshi_secret_key.pem:ro
      - ./output/calibration/production:/app/output/calibration/production:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  dashboard:
    build: .
    command: ["uvicorn", "src.dashboard.server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: postgres
    volumes:
      - ./config:/app/config:ro
      - ./config/kalshi_secret_key.pem:/app/kalshi_secret_key.pem:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
  pg_data:
